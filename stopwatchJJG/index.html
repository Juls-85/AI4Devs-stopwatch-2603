<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro y Cuenta Atrás</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #003399; /* Fondo azul exterior */
        }

        #app-container {
            width: 90vw;
            max-width: 800px;
            height: 500px;
            background-color: white;
            border: 4px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Pantallas */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* --- Pantalla de Selección --- */
        #menu-screen {
            flex-direction: row;
        }

        .menu-option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid #ddd;
        }

        #opt-stopwatch { background-color: #f0fff0; }
        #opt-countdown { background-color: #ffffff; }

        .menu-option h2 { font-size: 2.5rem; margin-bottom: 20px; color: #111; }

        .arrow { width: 80px; height: 100px; border: 4px solid #333; border-radius: 10px; }
        .arrow-up { 
            background-color: #33ff33; 
            clip-path: polygon(50% 0%, 100% 50%, 75% 50%, 75% 100%, 25% 100%, 25% 50%, 0% 50%);
        }
        .arrow-down { 
            background-color: #ff3333; 
            clip-path: polygon(25% 0%, 75% 0%, 75% 50%, 100% 50%, 50% 100%, 0% 50%, 25% 50%);
        }

        /* --- Estilos Comunes de Reloj --- */
        .display-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-display {
            width: 90%;
            height: 140px;
            background-color: #e6eaff;
            border: 4px solid #333;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .time-text { font-size: 5rem; font-weight: bold; font-family: monospace; }
        .ms-text { font-size: 1.5rem; position: absolute; bottom: 10px; right: 40px; }

        .controls {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
        }

        .btn {
            width: 180px;
            padding: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 15px;
            border: 3px solid #333;
            cursor: pointer;
        }

        .btn-start { background-color: #00ff00; }
        .btn-clear { background-color: #ff0000; }
        .btn-set { background-color: #00ff00; }
        .btn-num { background-color: #00ff00; width: 60px; height: 60px; font-size: 1.5rem; padding: 0; }

        /* --- Teclado Numérico --- */
        .numpad {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 10px;
            justify-items: center;
        }

        /* Barra Inferior Back */
        .footer-bar {
            background-color: #003399;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            color: white;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .back-btn::before { content: '◀'; color: #00ff00; margin-right: 8px; font-size: 1.5rem; }

    </style>
</head>
<body>

<div id="app-container">
    <div id="screen-menu" class="screen active">
        <div class="menu-option" id="opt-stopwatch" onclick="navTo('stopwatch')">
            <h2>Stopwatch</h2>
            <div class="arrow arrow-up"></div>
        </div>
        <div class="menu-option" id="opt-countdown" onclick="navTo('countdown')">
            <h2>Countdown</h2>
            <div class="arrow arrow-down"></div>
        </div>
    </div>

    <div id="screen-stopwatch" class="screen">
        <div class="display-container">
            <div class="main-display">
                <div class="time-text" id="sw-time">00:00:00</div>
                <div class="ms-text" id="sw-ms">000</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-start" id="sw-btn-start" onclick="toggleStopwatch()">Start</button>
            <button class="btn btn-clear" onclick="resetStopwatch()">Clear</button>
        </div>
        <div class="footer-bar">
            <button class="back-btn" onclick="navTo('menu')">Back</button>
        </div>
    </div>

    <div id="screen-countdown" class="screen">
        <div class="display-container">
            <div class="main-display">
                <div class="time-text" id="cd-time">00:00:00</div>
                <div class="ms-text" id="cd-ms">000</div>
            </div>
        </div>
        
        <div id="cd-setup-controls">
            <div class="numpad">
                <button class="btn btn-num" onclick="pressNum(5)">5</button>
                <button class="btn btn-num" onclick="pressNum(6)">6</button>
                <button class="btn btn-num" onclick="pressNum(7)">7</button>
                <button class="btn btn-num" onclick="pressNum(8)">8</button>
                <button class="btn btn-num" onclick="pressNum(9)">9</button>
                <button class="btn btn-set" style="width: 100px;" onclick="setCountdown()">Set</button>
                <button class="btn btn-num" onclick="pressNum(0)">0</button>
                <button class="btn btn-num" onclick="pressNum(1)">1</button>
                <button class="btn btn-num" onclick="pressNum(2)">2</button>
                <button class="btn btn-num" onclick="pressNum(3)">3</button>
                <button class="btn btn-num" onclick="pressNum(4)">4</button>
                <button class="btn btn-clear" style="width: 100px; background-color: #ccc; color: black;" onclick="clearNumpad()">Clear</button>
            </div>
        </div>

        <div id="cd-running-controls" class="controls" style="display:none;">
            <button class="btn btn-start" id="cd-btn-start" onclick="toggleCountdown()">Start</button>
            <button class="btn btn-clear" onclick="resetCountdown()">Clear</button>
        </div>

        <div class="footer-bar">
            <button class="back-btn" onclick="navTo('menu')">Back</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
